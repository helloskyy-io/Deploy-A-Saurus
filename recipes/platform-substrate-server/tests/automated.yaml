---
# Automated conformance tests for platform-substrate-server
# One-to-one translation of Template Standard §A.6 Post-Boot Check (the full
# platform-substrate check: §2 universals that survived the derive delta PLUS
# the K3s delta itself — §6.4 layered conformance).
# Run by DAS Stage 2 via the conformance/platform-substrate-server.yml task in
# the conformance Ansible role (mdc-ansible-collections).
#
# Failure of any assertion surfaces as a Stage 2 ActivityResult error with
# error_code set to the test `name` (Template Standard §6.3).

tests:
  # --- service state ---
  # qemu-guest-agent: running now AND will start on reboot (both matter;
  # is-active alone would pass a running-but-not-enabled unit that won't
  # survive the next reboot). INHERITED from the universal base — §6.4
  # proves it survived the delta.
  - name: "qemu_guest_agent_active"
    type: command
    command: "systemctl is-active qemu-guest-agent"
    expect_exit_code: 0
    expect_stdout: "active"

  - name: "qemu_guest_agent_enabled"
    type: command
    # Accept both `enabled` and `static`: `enabled` = traditional
    # multi-user.target.wants symlink; `static` = unit starts via
    # `BindsTo=dev-virtio\x2dports-org.qemu.guest_agent.0.device`
    # (modern systemd pattern, which Ubuntu 24.04 noble's
    # qemu-guest-agent ships as). The virtio guest-agent device is
    # always present in Proxmox VMs with `agent: 1`, so a `static` unit
    # WILL activate at boot — same semantic as `enabled` for the §A.6
    # intent ("unit starts automatically").
    command: "systemctl is-enabled qemu-guest-agent | grep -E '^(enabled|static)$'"
    expect_exit_code: 0

  - name: "tailscaled_unit_disabled"
    type: command
    command: "systemctl is-enabled tailscaled"
    # `systemctl is-enabled <disabled-unit>` exits 1 and prints "disabled".
    # Both the exit code AND stdout must match to confirm the unit is installed
    # (so lookup succeeds) AND disabled (exit 1, not 4 for not-found). This is
    # part of the K3s delta (tailscaled binary installed-not-enabled).
    expect_exit_code: 1
    expect_stdout: "disabled"

  # --- kernel / networking readiness for K3s + Calico (the delta) ---
  - name: "swap_off"
    type: command
    command: "swapon --show"
    expect_exit_code: 0
    expect_stdout: ""

  - name: "kernel_module_br_netfilter_loaded"
    type: command
    command: "lsmod | grep br_netfilter"
    expect_exit_code: 0

  - name: "kernel_module_overlay_loaded"
    type: command
    command: "lsmod | grep overlay"
    expect_exit_code: 0

  - name: "sysctl_bridge_nf_call_iptables"
    type: command
    command: "sysctl -n net.bridge.bridge-nf-call-iptables"
    expect_exit_code: 0
    expect_stdout: "1"

  - name: "sysctl_ip_forward"
    type: command
    command: "sysctl -n net.ipv4.ip_forward"
    expect_exit_code: 0
    expect_stdout: "1"

  # --- required tooling baseline (inherited from the universal base) ---
  - name: "curl_installed"
    type: command
    # curl is required because the K3s installer is `curl | sh` (§A.2).
    # --version exits 0 only if the binary is installed and runnable; the
    # version banner on stdout varies by build, so value is not asserted.
    command: "curl --version"
    expect_exit_code: 0

  # --- identity / access (inherited from the universal base) ---
  # Verifies §A.9.3's outcome: a valid SSH public key (ed25519/rsa/ecdsa)
  # is present in /root/.ssh/authorized_keys. The runner SSHes in as
  # root, so reading the file directly works.
  - name: "root_authorized_keys_has_ssh_pubkey"
    type: command
    command: "grep -qE '^(ssh-ed25519|ssh-rsa|ecdsa-sha2-) ' /root/.ssh/authorized_keys"
    expect_exit_code: 0

  - name: "sudoers_no_requiretty"
    type: command
    # `Defaults requiretty` in sudoers forces sudo to require a TTY, which
    # breaks Ansible's non-TTY SSH + become flow. The leading `!` inverts
    # grep's exit: we want grep to find NOTHING (exit 1 → `!` makes bash
    # exit 0). Ubuntu 24.04 cloud image default does not set this; the
    # assertion protects against a recipe step accidentally adding it.
    command: >-
      bash -c '! grep -rE "^[[:space:]]*Defaults[[:space:]]+.*requiretty"
      /etc/sudoers /etc/sudoers.d/ 2>/dev/null'
    expect_exit_code: 0

  # --- network configuration (inherited from the universal base) ---
  - name: "netplan_no_static_config"
    type: command
    # Template MUST be DHCP-only (§2.3, §A.2). Static IPs configured in
    # netplan bind the template to a single deployment. The `addresses:`
    # key is how netplan declares static IP configuration; absence of that
    # key across all netplan files proves no static config is baked in.
    command: >-
      bash -c '! grep -hE "^[[:space:]]*addresses:"
      /etc/netplan/*.yaml 2>/dev/null'
    expect_exit_code: 0

  # --- cloud-init datasource (NoCloud specifically per §4.1) ---
  - name: "cloud_init_nocloud_datasource_active"
    type: command
    # Verifies cloud-init is operational AND its active datasource is
    # NoCloud (not EC2, GCE, Azure, OpenStack, or any other). Inherited
    # from the universal base; §6.4 proves the delta did not regress it.
    command: >-
      bash -c "cloud-init status --long | grep -q 'DataSourceNoCloud'"
    expect_exit_code: 0

  - name: "no_operator_accounts_leaked"
    type: command
    # Single-regex atomic grep from §A.6; kept verbatim so the §A.6 check
    # is a 1:1 mapping. Inherited from the universal base; §6.4 proves the
    # delta did not add an operator account.
    # yamllint disable-line rule:line-length
    command: "getent passwd | grep -v '^(root\\|nobody\\|_\\|systemd-\\|messagebus\\|daemon\\|bin\\|sys\\|mail\\|www-data\\|sshd\\|tss\\|uuidd\\|proxy\\|syslog\\|landscape\\|pollinate\\|tcpdump\\|ubuntu-advantage)' | wc -l"
    expect_exit_code: 0
    expect_stdout: "0"
