---
# Deploy-A-Saurus Recipe: Ubuntu 24 Server Base
# Platform-substrate template for K3s cluster nodes (Clusters 1 + 2).
# Produced per DAS Template Standard Appendix A — platform-substrate-server class.
# See recipes/ubuntu-24-server-base/README.md for consumer + build-step context.

name: ubuntu-24-server-base
description: "Minimal Ubuntu 24.04 LTS substrate for K3s cluster nodes (platform installs orchestration post-clone)"
type: vm
version: 1.0.0
template_class: platform-substrate-server      # binding per DAS Template Standard §1

# Base image: canonical Ubuntu 24.04 LTS cloud image per Template Standard §5.1.
# Checksum pinned for reproducible rebuilds; refresh on point-release or security
# rebuild per Template Standard §5.2. Captured 2026-04-23 from
# https://cloud-images.ubuntu.com/noble/current/SHA256SUMS.
base:
  os: "Ubuntu"
  version: "24.04"
  install_method: cloud-image
  source_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  source_checksum: "sha256:6e7016f2c9f4d3c00f48789eb6b9043ba2172ccc1b6b1eaf3ed1e29dd3e52bb3"

# VM hardware specs (used by DAS Stage 1/2 to build + test; platform sets clone-time
# sizing per consumer spec). disk_size is the 10G floor from Template Standard §A.5 —
# the platform grows at clone; recipe MUST NOT pre-grow.
vm:
  cores: 2
  memory: 4096
  cpu: host
  bios: ovmf
  machine: i440fx
  scsi_controller: virtio-scsi-single
  disk_size: 10G
  storage: persistent-rbd
  os_type: l26
  # Networking Standard §6 defines `workload_tier` as a customer-facing tier. A
  # platform-substrate template is cloned into management-VLAN infrastructure, not
  # customer workloads; the tier concept is an imperfect fit. `production` is the
  # only validator-accepted value today. See PR body for the open question on
  # whether a new `platform-infra` tier is warranted (schema change — not in
  # scope for this recipe).
  workload_tier: production

# Ansible configuration. The recipe only names the playbook — its body lives in
# mdc-ansible-collections and implements Template Standard §A.9's 10 build steps.
ansible:
  playbooks:
    - das_ubuntu_24_server_base.yml
  vars:
    # Platform ansible pubkey is baked into /root/.ssh/authorized_keys per
    # Template Standard §A.2. Path follows SSH Key Management Standard; the
    # playbook reads the key from this worker-pod-mounted path at build time.
    platform_ansible_pubkey_path: /root/.ssh/ansible.pub

# Artifact storage (DAS Stage 3 writes the versioned RBD image + __base__ snapshot).
artifact:
  type: ceph-rbd
  ceph_pool: ssd-pool-rbd
  proxmox_storage: persistent-rbd
  snapshot: __base__
