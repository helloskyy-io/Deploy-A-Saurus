---
# Deploy-A-Saurus Recipe: Ubuntu 24 Server — Customer Workload (GPU-less base)
#
# Target repo: deploy-a-saurus/recipes/ubuntu-24-server-customer-workload/recipe.yaml
#
# GPU-LESS Linux base for GPU-bearing customer-workload VMs (Flux Edge, future
# Synaptron-on-VM, customer-browser-on-VM). Class: customer-workload-server
# (DAS Template Standard §1 + Appendix C, two-stage rewrite 7852a70 2026-06-06).
#
# TWO-STAGE MODEL (DAS Standard Two-Stage Model; DAS Template §C.4.1/§C.8):
#   Stage 1 (BAKED, this template):  the GPU-less base — §2 universals + the
#     class base requirements (root SSH + ansible key + qemu-guest-agent +
#     swap-off + DHCP + cloud-init NoCloud). NO NVIDIA driver, NO CUDA, NO
#     container-toolkit — those are NOT baked (§C.3 MUST-NOT).
#   Stage 2 (BUILT AT DEPLOY, per-VM):  the NVIDIA driver + CUDA, installed into
#     the running clone by the install_nvidia_driver post_deploy_role (below),
#     exact-pinned from the VM's own desired-state file (settings.nvidia_driver).
#
# ⛔ NEVER-CLONE-AFTER-INSTALL: this template MUST NOT contain a vendor agent
# (FluxCore, Synaptron client, customer-browser session manager) — they write
# per-machine identity at install time and install LIVE, per-VM, post-clone by
# their consuming workflow. Appendix C §C.6's no_vendor_agent_unit_files
# conformance check enforces this at bake time.

name: ubuntu-24-server-customer-workload
description: >-
  Ubuntu 24.04 LTS GPU-less base for customer GPU workloads — a clean derive
  from ubuntu-24-server-base (universal base). The NVIDIA driver + CUDA are NOT
  baked; they are built into the running clone at deploy, exact-pinned per-VM
  from desired state (settings.nvidia_driver). One generic base serves Flux
  Edge, Synaptron, and every GPU workload (per-VM pins live in the per-VM file).
type: vm
# 2.0.0 — MAJOR bump: stripping the baked GPU stack (NVIDIA 570 + CUDA 12-8) and
# re-modeling cloud-image → derive is a breaking content change. A consumer that
# cloned v1.0.0 expecting a GPU-baked template gets a GPU-less base on v2.0.0, so
# the version forces a deliberate adopt (§2.6 + §5.2). Mirrors the universal-base
# 1.0.0→2.0.0 bump for the analogous K3s strip.
version: 2.0.0
template_class: customer-workload-server  # binding per Template Standard §1 + Appendix C

# DERIVED source (DAS Template Standard §5.1 / §5.4 / §C.8 — GPU-less base +
# deploy-time GPU build). The build clones the published parent template instead
# of fetching a raw cloud image — no source_url / source_checksum (the parent IS
# the source; the recipe validator rejects them on a derive recipe). The parent
# is version-pinned per the §5.4 lineage contract: when ubuntu-24-server-base
# publishes a new version, this pin MUST be bumped and this template rebuilt
# (§5.2 rebuild trigger). Stage 1 resolves the parent's published VMID from the
# parent's golden-template declaration and asserts the published version matches
# this pin (fails loud with DERIVE_PARENT_VERSION_MISMATCH otherwise).
#
# Pinned to @2.0.0 — the universal-base re-model (K3s strip) is a breaking
# content change, so the re-modeled base publishes at a NEW major version. The
# operator re-pins here if the rebuilt base lands at a different version (rebuild
# sequence: parent before child). Matches the platform-substrate-server pin.
base:
  os: "Ubuntu"
  version: "24.04"
  install_method: derive
  derive_from: ubuntu-24-server-base@2.0.0

# VM hardware specs for the derive BUILD/TEST VM. The clone inherits the parent's
# disk (the universal base's 10G §A.5 floor); the GPU stack is NO LONGER baked,
# so this base does NOT carry the ~5–8GB CUDA footprint at bake (§C.5 rewrite) —
# it matches the base profile. The DEPLOYED GPU host sizes for the deploy-time
# GPU stack + vendor-agent runtime via the per-VM settings.hardware.disk_gb
# (~40GB — VM Management §2 / §C.5), applied at clone so cloud-init growpart
# auto-grows BEFORE the deploy-time GPU install runs. The recipe MUST NOT
# pre-grow. A customer-workload base adds no bake-time hardware over the base —
# same profile as platform-substrate-server.
vm:
  cores: 2
  memory: 4096
  cpu: host
  bios: ovmf
  machine: q35  # modern PCIe + UEFI (bios: ovmf); inherited from the parent clone
  scsi_controller: virtio-scsi-single
  disk_size: 10G
  storage: persistent-rbd
  os_type: l26
  # Only validator-accepted value today; fit is imperfect for a customer-workload
  # base template (carried over from the base — same open question, see PR body).
  workload_tier: production

# Bake-time Ansible — the GPU-LESS base delta ONLY. The body lives in
# mdc-ansible-collections and applies the §C.8 base delta (delete default user,
# root SSH, ansible key, qemu-guest-agent + curl, swap-off, cloud-init NoCloud,
# DHCP, generalize-before-template). It bakes NO GPU stack (no NVIDIA driver, no
# CUDA, no container-toolkit — §C.3 / §C.8 build-step MUST-NOT) and NO vendor
# agent (NEVER-CLONE). The §2 universals are inherited from the cloned base, not
# re-applied. Resolves the platform ansible key from the canonical location
# (ANSIBLE_SSH_KEY_PATH; default /root/.ssh/ansible) — the recipe bakes no path.
#
# COMPANION (mdc-ansible-collections, NOT this PR): das_ubuntu_24_server_customer_workload.yml
# must be re-modeled GPU-less (strip the NVIDIA 570 / CUDA 12-8 bake tasks) so the
# baked artifact matches this recipe's GPU-less intent. The recipe leads; the
# playbook follows (same pattern as recipe-follows-standard). See PR body.
ansible:
  playbooks:
    - das_ubuntu_24_server_customer_workload.yml

# Deploy-time build (Stage 2 — the GPU delta, NOT baked). Applied to the running
# clone at deploy by the reconcile=deploy workflow (DAS Template §C.8; Phase 10
# producer / Django Phase 7 consumer), NOT at bake time.
#
# PRODUCER/CONSUMER CONTRACT (binding — DAS Standard Two-Stage Model; §C.4.1):
#   - This recipe declares the MECHANISM: which role runs (post_deploy_roles) and
#     which variable NAMES it consumes (post_deploy_vars). The recipe carries the
#     names; it does NOT carry the values.
#   - The VALUES come from the per-VM desired-state file (VM Management §2), which
#     is their single source of truth. post_deploy_vars map to settings.* fields:
#
#       post_deploy_var   ← per-VM desired-state field        notes
#       ───────────────────────────────────────────────────────────────────────
#       nvidia_driver     ← settings.nvidia_driver            EXACT pinned build
#                                                             (e.g. "570.158.01"),
#                                                             NEVER the bare series
#       cuda              ← settings.cuda                      e.g. "12-8" (when
#                                                             settings.gpu: true)
#
#   - ROLE VAR-NAME HOP (the consumer MUST wire this): install_nvidia_driver
#     requires the extra_var `nvidia_driver_version` (it asserts it is defined and
#     carries NO pin of its own — defaults/main.yml). The consumer (Django Phase 7
#     reconciler/executor) maps settings.nvidia_driver → extra_var
#     nvidia_driver_version when invoking the role. post_deploy_vars names the
#     desired-state contract (nvidia_driver/cuda); the role-internal name is the
#     final hop the executor bridges.
#   - UNTRUSTED-INPUT VALIDATION (the consumer's obligation, documented here):
#     post_deploy_vars values flow from desired state into Ansible extra_vars. The
#     reconciler's executor MUST format-validate them as untrusted input before the
#     install runs — settings.nvidia_driver is a build-version string
#     (e.g. ^[0-9]+\.[0-9]+\.[0-9]+$), NOT arbitrary text; settings.cuda is an apt
#     coordinate (e.g. ^[0-9]+-[0-9]+$). This phase only DECLARES the contract; the
#     validation is implemented consumer-side (Django Phase 7), not here.
#   - EXACT-PIN at deploy (§C.4.1 / §5; criterion #5): install_nvidia_driver adds
#     the NVIDIA CUDA repo, installs nvidia-driver-<series> from the NVIDIA repo,
#     pins *nvidia* at Pin-Priority 1001, and apt-mark holds it — NEVER the floating
#     -server metapackage. The pin source is the per-VM settings.nvidia_driver
#     value, NOT a recipe constant. Verified post-deploy (§C.6.1; LCM Phase 3
#     verify_host_driver) against the built clone.
runtime:
  post_deploy_roles:
    - skyy_net.common.install_nvidia_driver   # the role (the mechanism) — FQCN, generic, idempotent
  post_deploy_vars:
    - nvidia_driver                           # var NAME; value: settings.nvidia_driver (per-VM file)
    - cuda                                    # var NAME; value: settings.cuda (per-VM file)

# Stage 2 conformance: the EXECUTOR is the conformance role's
# tasks/customer-workload-server.yml (DAS Template Standard §6.2 + Appendix C
# §C.6) — the GPU-less base check (§2 universals + base requirements + the binding
# no_vendor_agent_unit_files assertion; NO GPU assertion at bake per §C.6.1). The
# recipe-side SPEC lives in tests/automated.yaml + tests/human.md, kept 1:1 with
# that task (das_standard.md mandates both files for every recipe; §6.2 clarifies
# the conformance role is the executor and does NOT remove the recipe-side
# obligation). The GPU-stack assertions carry requires_post_deploy: true so the
# bake gate skips them; they run against the built clone post-deploy (§C.6.1).
#
# COMPANION (mdc-ansible-collections, NOT this PR): the conformance role task must
# be updated to match this GPU-less spec — relocate the GPU assertions out of the
# bake gate and assert the full §2-universal block. See PR body.

# Artifact storage (DAS Stage 3 writes the RBD image + __base__ snapshot).
artifact:
  type: ceph-rbd
  ceph_pool: ssd-pool-rbd
  proxmox_storage: persistent-rbd
  snapshot: __base__
